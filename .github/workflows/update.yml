name: Daily ReelAdda Update

on:
  schedule:
    # Every day at 9:00 AM IST (3:30 AM UTC)
    - cron: "30 3 * * *"
  workflow_dispatch: {}   # also lets you run it manually anytime with one click

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout site
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch latest releases
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: node scripts/update.js

      - name: Commit updated data
        run: |
          git config user.name "reeladda-bot"
          git config user.email "actions@github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Daily release scan: $(date -u +%Y-%m-%d)"
          git push
