name: Daily FilmyChill Update
on:
  schedule:
    # Two runs daily. Odd off-peak minutes on purpose: GitHub delays scheduled
    # workflows at popular slots (:00/:30) by 3-5 hours; off-peak minutes run near on-time.
    # Morning: ~7:22 AM IST (1:52 UTC) - fresh picks ready before the morning traffic.
    # Evening: ~7:22 PM IST (13:52 UTC) - catches same-day OTT drops whose TMDB
    # metadata (providers/ratings) filled in during the day after the midnight release.
    - cron: "52 1 * * *"
    - cron: "52 13 * * *"
  workflow_dispatch: {}   # also lets you run it manually anytime with one click
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout site
        uses: actions/checkout@v6
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      # Unit tests run FIRST (no API calls) so a code regression fails fast,
      # before we spend time/quota on the build. Covers pure functions + the
      # SSR-injection guard (incl. the comment-in-script regression test).
      - name: Run unit tests
        run: node scripts/test.js

      - name: Fetch latest releases
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          # Optional: enables "trailer views" social proof on cards. Create a free key in
          # Google Cloud Console (YouTube Data API v3) and add it as a repo secret named
          # YT_API_KEY. If absent, the build simply skips trailer stats — nothing breaks.
          YT_API_KEY: ${{ secrets.YT_API_KEY }}
        run: node scripts/update.js

      # Smoke test validates the SHAPE + freshness of EVERY country's data file.
      # Fails the build (before commit) if any file is missing, empty, stale, or malformed —
      # so a bad/partial build never ships.
      - name: Smoke-test generated data
        run: node scripts/smoke.js us uk au de

      - name: Verify film pages exist
        run: |
          node -e "
            const fs = require('fs');
            const pages = fs.readdirSync('movie').filter(f => f.endsWith('.html'));
            if (pages.length < 5) { console.error('VALIDATION FAILED: film pages missing'); process.exit(1); }
            console.log('film pages OK:', pages.length);
          "

      - name: Commit updated data
        id: commit
        run: |
          git config user.name "filmychill-bot"
          git config user.email "actions@github.com"
          git add data.json data-*.json ott-seen.json takes.json llms.txt llms-full.txt pages-manifest.json feed.xml index.html us/ uk/ au/ de/ ae/ ca/ sg/ movie/ new-on-ott/ new-on-*/ hindi/ tamil/ telugu/ malayalam/ kannada/ week/ sitemap.xml
          if git diff --staged --quiet; then
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            echo "No changes to commit."
          else
            git commit -m "Daily release scan: $(date -u +%Y-%m-%d)"
            git push
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          fi

      # IndexNow: tell Bing/DuckDuckGo/Yandex INSTANTLY that today's pages changed, instead
      # of waiting for a crawl — exactly the freshness race a daily site wants to win.
      # (Google doesn't use IndexNow; it relies on the sitemap lastmod + normal crawling.)
      # Free and keyless as a service; the key below just proves domain ownership via the
      # matching KEY.txt file in the repo root, served by GitHub Pages. Only pings when a
      # commit actually happened. Ping failures never fail the build (|| true).
      - name: Ping IndexNow
        if: steps.commit.outputs.pushed == 'true'
        run: |
          sleep 90  # give GitHub Pages a moment to deploy the new commit first
          curl -s -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d @indexnow-payload.json || true
