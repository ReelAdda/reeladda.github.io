name: Daily FilmyChill Update
on:
  schedule:
    # Every day at 9:00 AM IST (3:30 AM UTC)
    - cron: "30 3 * * *"
  workflow_dispatch: {}   # also lets you run it manually anytime with one click
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout site
        uses: actions/checkout@v6
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      # Unit tests run FIRST (no API calls) so a code regression fails fast,
      # before we spend time/quota on the build. Covers pure functions + the
      # SSR-injection guard (incl. the comment-in-script regression test).
      - name: Run unit tests
        run: node scripts/test.js

      - name: Fetch latest releases
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: node scripts/update.js

      # Smoke test validates the SHAPE + freshness of EVERY country's data file.
      # Fails the build (before commit) if any file is missing, empty, stale, or malformed —
      # so a bad/partial build never ships.
      - name: Smoke-test generated data
        run: node scripts/smoke.js us uk au de

      - name: Verify film pages exist
        run: |
          node -e "
            const fs = require('fs');
            const pages = fs.readdirSync('movie').filter(f => f.endsWith('.html'));
            if (pages.length < 5) { console.error('VALIDATION FAILED: film pages missing'); process.exit(1); }
            console.log('film pages OK:', pages.length);
          "

      - name: Commit updated data
        run: |
          git config user.name "filmychill-bot"
          git config user.email "actions@github.com"
          git add data.json data-*.json index.html us/ uk/ au/ de/ movie/ sitemap.xml
          git diff --staged --quiet || git commit -m "Daily release scan: $(date -u +%Y-%m-%d)"
          git push
